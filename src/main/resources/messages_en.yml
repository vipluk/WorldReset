command-usage: "\n&8&m------&8[ &b&lWorldReset &8]&m------\n&e/wr reset [seconds] &8- &7Instantly reset the world (optional countdown)\n&e/wr limbo [seconds] &8- &7Teleport to/from Limbo (optional countdown)\n&e/wr limbo <in> <out> &8- &7Set automatic limbo delays\n&e/wr timer &6<&estart&6|&epause&6|&ereset&6|&eenable&6|&edisable&6|&emode&6|&escope&6|&egoal&6> &8- &7Timer settings\n&e/wr compass &6<&eenable&6|&edisable&6> &8- &7Player locator bar settings\n&e/wr filter &6<&estructure&6|&ebiome&6> &6<&ename&6|&eclear&6> &8- &7Smart spawn shifter\n&e/wr seed [value] &8- &7Set fixed or random seed\n&e/wr templates &6<&eenable&6|&edisable&6|&efolder&6|&estatus&6> &8- &7World templates\n&e/wr autoreset &6<&estart&6|&estop&6|&edisable&6|&eloop&6|&etime&6> &8- &7Auto-reset timer\n&e/wr death &8- &7Toggle Reset-on-Death mode\n&e/wr silent &8- &7Toggle global broadcast messages\n&e/wr language &6<&een&6|&epl&6> &8- &7Change plugin language\n&e/wr reload &8- &7Reload plugin configuration\n&8&m----------------------------"
